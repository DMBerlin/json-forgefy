<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Forgefy Playground</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 JSON Forgefy Playground</h1>
            <p>Transform JSON with powerful operators</p>
            <div class="links">
                <a href="https://github.com/DMBerlin/json-forgefy" target="_blank">GitHub</a>
                <a href="https://www.npmjs.com/package/json-forgefy" target="_blank">NPM</a>
            </div>
        </header>

        <main>
            <div class="editor-section">
                <div class="editor-panel">
                    <h2>Payload (Input)</h2>
                    <textarea id="payload" placeholder="Enter your JSON payload here..."></textarea>
                </div>

                <div class="editor-panel">
                    <h2>Projection (Blueprint)</h2>
                    <textarea id="projection" placeholder="Enter your projection blueprint here..."></textarea>
                </div>
            </div>

            <div class="controls">
                <button id="transform-btn" class="btn-primary">Transform</button>
                <button id="clear-btn" class="btn-secondary">Clear</button>
                <button id="example-btn" class="btn-secondary">Load Example</button>
            </div>

            <div class="result-section">
                <h2>Result</h2>
                <div id="error" class="error"></div>
                <pre id="result"></pre>
            </div>
        </main>

        <footer>
            <p>Made with ❤️ by <a href="https://github.com/DMBerlin" target="_blank">Daniel Marinho</a></p>
        </footer>
    </div>

    <script src="forgefy-browser.js"></script>
    <script src="app.js"></script>
</body>
</html>
